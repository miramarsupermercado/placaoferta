<script>
  window.listaCartazesMemoria = {};
  // Variáveis para gerenciar o estado da ordenação
  window.currentSortColumn = 'salvo';
  window.currentSortDirection = 'desc';
  
  // Variáveis de Paginação
  window.paginaAtual = 1;
  const itensPorPagina = 15;

  function formatPtBrToParts(value) {
    if (!value) return { reais: '', centavos: '' };
    const s = String(value).replace(/[^0-9,\.]/g, '').replace(',', '.');
    const n = parseFloat(s);
    if (isNaN(n)) return { reais: '', centavos: '' };
    const parts = n.toFixed(2).split('.');
    return { reais: String(Number(parts[0])), centavos: ',' + parts[1] };
  }

  function formatStringToPtBrDate(dateStr) {
    if (!dateStr) return '';
    const parts = dateStr.split('-');
    if (parts.length !== 3) return dateStr;
    return `${parts[2]}/${parts[1]}/${parts[0]}` ;
  }

  function sanitizeFileName(name, ext = 'pdf') {
    if (!name) name = 'cartaz';
    name = name.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    name = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
    const now = new Date().toISOString().replace(/[:.]/g, '-');
    return `${name}-${now}.${ext}`;
  }

  function blobToBase64(blob) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onloadend = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }

  function base64ToBlobUrl(base64) {
    if (!base64) return '#';
    const parts = base64.split(',');
    const mime = parts[0].match(/:(.*?);/)[1];
    const bstr = atob(parts[1]);
    let n = bstr.length;
    const u8arr = new Uint8Array(n);
    while(n--) u8arr[n] = bstr.charCodeAt(n);
    const blob = new Blob([u8arr], {type:mime});
    return URL.createObjectURL(blob);
  }
</script>

  // Função para renderizar a tabela com base nos dados, estado de ordenação e filtros ativos
  function renderizarTabela() {
    const tabelaContainer = document.getElementById('tabela-container');
    const tabelaBody = document.getElementById('tabela-body-cartazes');
    const vazio = document.getElementById('lista-vazia');
    
    tabelaBody.innerHTML = '';

    if (!window.listaCartazesMemoria || Object.keys(window.listaCartazesMemoria).length === 0) {
      tabelaContainer.style.display = 'none';
      vazio.style.display = 'block';
      vazio.textContent = 'Nenhum cartaz encontrado. Crie na página inicial!';
      document.getElementById('paginacao-controles').style.display = 'none';
      return;
    }

    // Captura os valores digitados nos inputs de filtro
    const valFiltroTipo = document.getElementById('filtro-tipo').value.toLowerCase().trim();
    const valFiltroDesc = document.getElementById('filtro-descricao').value.toLowerCase().trim();
    const valFiltroPreco = document.getElementById('filtro-preco').value.toLowerCase().trim();
    const valFiltroLoja = document.getElementById('filtro-loja').value.toLowerCase().trim();

    // Mapeia os dados processando as propriedades necessárias para ordenação
    let itensArray = Object.keys(window.listaCartazesMemoria).map((id) => {
      const item = window.listaCartazesMemoria[id];
      
      // Extrai o Tipo de Cartaz se houver colchetes na descrição
      let tipo = "PREÇO AVULSO";
      let descricaoLimpa = item.descricaoText || "";
      if (descricaoLimpa.startsWith("[")) {
        const indexFechamento = descricaoLimpa.indexOf("]");
        if (indexFechamento !== -1) {
          tipo = descricaoLimpa.substring(1, indexFechamento).toUpperCase();
          descricaoLimpa = descricaoLimpa.substring(indexFechamento + 1).trim();
        }
      }
      
      if (tipo === "PLACA AVULSA") {
        tipo = "PREÇO AVULSO";
      }

      // Monta a string de vigência
      let vigenciaExibicao = "";
      if (item.dataInicial && item.dataFinal) {
        vigenciaExibicao = `${formatStringToPtBrDate(item.dataInicial)} À ${formatStringToPtBrDate(item.dataFinal)}`;
      } else if (item.dataFinal) {
        vigenciaExibicao = `ATÉ ${formatStringToPtBrDate(item.dataFinal)}`;
      } else {
        vigenciaExibicao = item.rodapeText || item.rodapeOutput || "Não informada";
      }

      // Converte preço para float para ordenação numérica precisa
      let precoNum = 0;
      if (item.precoText) {
        precoNum = parseFloat(String(item.precoText).replace(/[^0-9,\.]/g, '').replace(',', '.')) || 0;
      }

      return {
        id,
        itemOriginal: item,
        descricao: descricaoLimpa.toUpperCase(),
        tipo: tipo,
        vigencia: vigenciaExibicao.toUpperCase(),
        precoTexto: item.precoText ? 'R$ ' + item.precoText : 'Em branco',
        precoValor: precoNum,
        loja: item.lojaText || 'Não informada', // Captura o campo salvo pelo index.html
        salvoTexto: `${item.dateStr} às ${item.timeStr}`,
        timestamp: item.timestamp || 0,
        base64: item.base64
      }
        });

    // Aplica o filtro de pesquisa dinamicamente se houver dados digitados
    itensArray = itensArray.filter(row => {
  let matchTipo = true;
  if (valFiltroTipo) {
    if (valFiltroTipo === "preço avulso") {
      matchTipo = row.tipo.toLowerCase().includes("preço avulso") || row.tipo.toLowerCase().includes("placa avulsa");
    } else {
      matchTipo = row.tipo.toLowerCase().includes(valFiltroTipo);
    }
  }
      const matchDesc = !valFiltroDesc || row.descricao.toLowerCase().includes(valFiltroDesc);
      const matchPreco = !valFiltroPreco || row.precoTexto.toLowerCase().includes(valFiltroPreco);
        const matchLoja = !valFiltroLoja || row.loja.toLowerCase() === valFiltroLoja;
      return matchTipo && matchDesc && matchPreco && matchLoja;
    });

    if (itensArray.length === 0) {
      tabelaContainer.style.display = 'none';
      vazio.style.display = 'block';
      vazio.textContent = 'Nenhum resultado corresponde aos filtros aplicados.';
      document.getElementById('paginacao-controles').style.display = 'none';
      return;
    }

    vazio.style.display = 'none';
    tabelaContainer.style.display = 'block';

    // Executa a ordenação com base na coluna e direção activa
    itensArray.sort((a, b) => {
      let comparison = 0;
      if (window.currentSortColumn === 'descricao') {
  comparison = a.descricao.localeCompare(b.descricao);
} else if (window.currentSortColumn === 'loja') { // Adicione esta condição
  comparison = a.loja.localeCompare(b.loja);
} else if (window.currentSortColumn === 'tipo') {
        comparison = a.tipo.localeCompare(b.tipo);
      } else if (window.currentSortColumn === 'vigencia') {
        comparison = a.vigencia.localeCompare(b.vigencia);
      } else if (window.currentSortColumn === 'preco') {
        comparison = a.precoValor - b.precoValor;
      } else if (window.currentSortColumn === 'salvo') {
        comparison = a.timestamp - b.timestamp;
      }
      return window.currentSortDirection === 'asc' ? comparison : -comparison;
    });

    // --- LÓGICA DE PAGINAÇÃO ---
    const totalItens = itensArray.length;
    const totalPaginas = Math.ceil(totalItens / itensPorPagina);
    
    if (window.paginaAtual > totalPaginas) window.paginaAtual = totalPaginas || 1;
    
    const inicio = (window.paginaAtual - 1) * itensPorPagina;
    const fim = inicio + itensPorPagina;
    const itensPaginados = itensArray.slice(inicio, fim);

    // Atualiza controles Visuais
    const controlesPag = document.getElementById('paginacao-controles');
    if (totalItens > itensPorPagina) {
        controlesPag.style.display = 'flex';
        document.getElementById('info-paginacao').textContent = `Página ${window.paginaAtual} de ${totalPaginas}`;
        document.getElementById('prev-page').disabled = (window.paginaAtual === 1);
        document.getElementById('next-page').disabled = (window.paginaAtual === totalPaginas);
    } else {
        controlesPag.style.display = 'none';
    }

    // Atualiza os indicadores visuais nos cabeçalhos
    document.querySelectorAll('th.sortable').forEach(th => {
      const iconSpan = th.querySelector('.sort-icon');
      const colName = th.getAttribute('data-sort');
      if (colName === window.currentSortColumn) {
        iconSpan.textContent = window.currentSortDirection === 'asc' ? ' ▲' : ' ▼';
      } else {
        iconSpan.textContent = '';
      }
    });

    // Renderiza as linhas na tabela (usando o array paginado)
    itensPaginados.forEach((row) => {
      const tr = document.createElement('tr');
      const pdfUrl = base64ToBlobUrl(row.base64);
      const nomeParaDownload = sanitizeFileName(row.descricao, 'pdf');

      // Define a cor de texto correspondente a cada tipo de cartaz solicitado
      let corDoTipo = "black";
      const tUpper = row.tipo.toUpperCase();
      if (tUpper.includes("ENCARTE SEMANAL")) corDoTipo = "gray";
      else if (tUpper.includes("TERÇA DA CARNE")) corDoTipo = "red";
      else if (tUpper.includes("QUINTA DA FEIRA")) corDoTipo = "green";
      else if (tUpper.includes("FDS DE OFERTAS")) corDoTipo = "orange";
      else if (tUpper.includes("FECHA MÊS")) corDoTipo = "blue";
      else if (tUpper.includes("PREÇO AVULSO") || tUpper.includes("PLACA AVULSA")) corDoTipo = "black";

      tr.innerHTML = `
        <td class="col-checkbox"><input type="checkbox" class="cartaz-select-item" data-id="${row.id}"></td>
        <td class="col-descricao">${row.descricao}</td>
        <td class="col-tipo" style="color: ${corDoTipo};">${row.tipo === "PREÇO AVULSO" ? "PLACA AVULSA" : row.tipo}</td>
        <td class="col-vigencia">${row.vigencia}</td>
        <td class="col-preco">${row.precoTexto}</td>
        <td class="col-loja" style="font-weight: bold; color: #555;">${row.loja}</td> <td class="col-salvo">${row.salvoTexto}</td>
        <td class="col-acoes">
          <a href="${pdfUrl}" target="_blank" class="btn-visualizar" title="Visualizar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
        <circle cx="12" cy="12" r="3"></circle>
    </svg>
</a>
<button onclick="window.editarCartazIndex('${row.id}')" class="btn-editar" title="Editar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
    </svg>
</button>
<a href="${pdfUrl}" download="${nomeParaDownload}" class="btn-baixar" title="Baixar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path>
        <polyline points="7 10 12 15 17 10"></polyline>
        <line x1="12" y1="15" x2="12" y2="3"></line>
    </svg>
</a>
<button onclick="window.excluirCartazItem('${row.id}')" class="btn-excluir" title="Excluir">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        <line x1="10" y1="11" x2="10" y2="17"></line>
        <line x1="14" y1="11" x2="14" y2="17"></line>
    </svg>
</button>
        </td>
      `;

      tabelaBody.appendChild(tr);
    });
  }

  // Ouvintes de evento de digitação para disparar os filtros de busca
  document.getElementById('filtro-tipo').addEventListener('change', () => { window.paginaAtual = 1; renderizarTabela(); });
  document.getElementById('filtro-descricao').addEventListener('input', () => { window.paginaAtual = 1; renderizarTabela(); });
  document.getElementById('filtro-preco').addEventListener('input', () => { window.paginaAtual = 1; renderizarTabela(); });
  document.getElementById('filtro-loja').addEventListener('change', () => { window.paginaAtual = 1; renderizarTabela(); });

  // Eventos dos botões de paginação
  document.getElementById('prev-page').addEventListener('click', () => {
      if (window.paginaAtual > 1) {
          window.paginaAtual--;
          renderizarTabela();
          window.scrollTo(0,0);
      }
  });

  document.getElementById('next-page').addEventListener('click', () => {
      const totalPaginas = Math.ceil(Object.keys(window.listaCartazesMemoria).length / itensPorPagina);
      if (window.paginaAtual < totalPaginas) {
          window.paginaAtual++;
          renderizarTabela();
          window.scrollTo(0,0);
      }
  });

  // Carrega e atualiza a tabela em tempo real varrendo os nós aninhados de cada categoria
  onValue(cartazesRef, (snapshot) => {
    if (!snapshot.exists()) {
      window.listaCartazesMemoria = {};
    } else {
      const rawData = snapshot.val();
      const flattenedData = {};
      
      // Itera recursivamente para capturar itens independentemente se estão na raiz ou aninhados por tipo
      Object.keys(rawData).forEach(key => {
        if (rawData[key] && rawData[key].base64) {
          flattenedData[key] = rawData[key];
        } else if (typeof rawData[key] === 'object') {
          Object.keys(rawData[key]).forEach(subKey => {
            if (rawData[key][subKey] && rawData[key][subKey].base64) {
              // Constrói o caminho completo da chave para preservação e salvamento corretos
              flattenedData[`${key}/${subKey}`] = rawData[key][subKey];
            }
          });
        }
      });
      window.listaCartazesMemoria = flattenedData;
    }
    renderizarTabela();
  });

  // Configura os ouvintes de clique nos cabeçalhos ordenáveis
  document.querySelectorAll('th.sortable').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.getAttribute('data-sort');
      if (window.currentSortColumn === col) {
        window.currentSortDirection = window.currentSortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        window.currentSortColumn = col;
        window.currentSortDirection = 'asc';
      }
      window.paginaAtual = 1;
      renderizarTabela();
    });
  });

  document.getElementById('select-all-cartazes').addEventListener('change', (e) => {

  // Ação de salvamento em lote dos itens selecionados
  document.getElementById('btn-salvar-lote').addEventListener('click', async () => {
    const selecionados = document.querySelectorAll('.cartaz-select-item:checked');
    
    if (selecionados.length === 0) {
      alert('Por favor, selecione ao menos um cartaz na tabela usando o checkbox!');
      return;
    }

    const inputIni = document.getElementById('lote-data-inicial').value;
    const inputFim = document.getElementById('lote-data-final').value;

    if (!inputFim) {
      alert('A Nova Data Final é obrigatória para processar a alteração.');
      return;
    }

    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingText = document.getElementById('loading-text');
    loadingOverlay.style.display = 'flex';

    // Elementos do Box Oculto de Renderização Técnico
    const dOut = document.getElementById('desc-render');
    const pAntigoOut = document.getElementById('antigo-render');
    const rsOut = document.getElementById('rs-render');
    const rOut = document.getElementById('reais-render');
    const cOut = document.getElementById('centavos-render');
    const cadaOut = document.getElementById('cada-render');
    const rodOut = document.getElementById('rodape-render');
    const areaPreco = document.getElementById('area-preco-render');

    try {
      let contador = 0;
      
      // Processa em loop sequencial cada um dos cartazes marcados
      for (const cb of selecionados) {
        contador++;
        const id = cb.getAttribute('data-id');
        const item = window.listaCartazesMemoria[id];

        loadingText.textContent = `Atualizando cartaz ${contador} de ${selecionados.length}...`;

        // 1. Remove os colchetes com tipo do produto para não incluí-los no PDF
        let descricaoLimpa = item.descricaoText || "";
        if (descricaoLimpa.startsWith("[")) {
          const indexFechamento = descricaoLimpa.indexOf("]");
          if (indexFechamento !== -1) {
            descricaoLimpa = descricaoLimpa.substring(indexFechamento + 1).trim();
          }
        }
        dOut.textContent = descricaoLimpa.toUpperCase();
        
        if (item.customFontSize && item.customTop) {
          dOut.style.fontSize = item.customFontSize;
          dOut.style.top = item.customTop;
        } else {
          const len = dOut.textContent.length;
          let fontSize = 40;
          if (len <= 10) fontSize = 120;
          else if (len <= 15) fontSize = 100;
          else if (len <= 25) fontSize = 70;
          else if (len <= 35) fontSize = 55;
          else if (len <= 60) fontSize = 45;
          dOut.style.fontSize = fontSize + 'px';
          dOut.style.top = '170px';
        }

        // 2. Lógica do Cifrão R$ e Formatação de Preço de Oferta
        const precoOfertaValor = item.precoText || '';
        if (!precoOfertaValor.trim()) {
          rsOut.style.display = 'none';
          rOut.textContent = '';
          cOut.textContent = '';
        } else {
          rsOut.style.display = '';
          const parts = formatPtBrToParts(precoOfertaValor);
          rOut.textContent = parts.reais;
          cOut.textContent = parts.centavos;

          if (parts.reais.length >= 3) {
            rOut.style.fontSize = '220px';

            rOut.style.fontSize = '260px';

        // 3. Re-equalização Fiel do Preço Antigo (Espelhamento do index.html)
        const precoAntesValor = item.precoAntigoText || item.precoAntesText || '';
        if (precoAntesValor.trim()) {
          const vAntes = Number(String(precoAntesValor).replace(/[^0-9,\.]/g, '').replace(',', '.'));
          const parteInteira = precoOfertaValor.split(',')[0].replace(/\D/g, '');
          const charsLeftOfComma = parteInteira.length;

          if (!isNaN(vAntes)) {
            const valorFormatatedAntes = vAntes.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

            if (charsLeftOfComma >= 3) {
              pAntigoOut.innerHTML = `DE R$ <span class="numeros-riscados">${valorFormatatedAntes}</span> POR:`;

              areaPreco.style.top = '260px';
            } else {
              pAntigoOut.innerHTML = `DE <br> <span class="numeros-riscados">R$ ${valorFormatatedAntes}</span><br>  POR:`;   
              pAntigoOut.style.display = '';
              pAntigoOut.style.position = 'relative';
              pAntigoOut.style.top = '295px';

              if (charsLeftOfComma === 1) {
                pAntigoOut.style.right = '130px';

              pAntigoOut.style.color = '';

              pAntigoOut.style.fontSize = '';
              pAntigoOut.style.margin = '6px 0 8px 0';

        } else {

          areaPreco.style.top = '290px';
        }

        // 4. Lógica de Posição e Fonte Dinâmica do elemento .cada
        const textoCada = item.cadaText || item.cadaOutput || '';
        cadaOut.textContent = textoCada;
        const lenCada = textoCada.length;
        if (lenCada > 4 && lenCada <= 7) {

          const deslocamento = Math.min((lenCada - 4) * 10, 30);
          cadaOut.style.left = (270 - deslocamento) + 'px';

          cadaOut.style.fontSize = '40px';
          if (lenCada > 7) {
            const deslocamento = 60;
            cadaOut.style.left = (270 - deslocamento) + 'px';

            cadaOut.style.left = '270px';
          }
        }

        // 5. Aplica as regras condicionais das novas datas no rodapé (Preservando Observações se não houver novas datas)
        let novoRodapeTexto = item.rodapeText || item.rodapeOutput || '';
        if (inputIni && inputFim) {
          const di = inputIni.split('-');

          novoRodapeTexto = `Oferta válida de ${di[2]} à ${df[2]}/${df[1]}/${df[0]} ou enquanto durar o estoque`;
        } else if (!inputIni && inputFim) {

          novoRodapeTexto = `Oferta válida até ${df[2]}/${df[1]}/${df[0]} ou enquanto durar o estoque`;
        }
        rodOut.textContent = novoRodapeTexto;

        // --- INÍCIO DA FIDELIDADE VISUAL (APP MODE E OFERTA DO DIA) ---
        let encarteAtual = "GERAL";
        let descricaoParaEncarte = item.descricaoText || "";
        if (descricaoParaEncarte.startsWith("[")) {
          const idx = descricaoParaEncarte.indexOf("]");
          if (idx !== -1) {
            encarteAtual = descricaoParaEncarte.substring(1, idx).toUpperCase();
          }
        }

        const cartazRender = document.getElementById('cartaz-render');
        const appMode = (encarteAtual === 'OFERTAS APP');
        const isOfertaDoDia = (encarteAtual === 'OFERTA DO DIA');
        const stackRender = document.getElementById('price-stack-render');

        if (encarteAtual === 'PREÇO AVULSO' || encarteAtual === 'PLACA AVULSA') {
            cartazRender.style.backgroundImage = "url('fundo-cartaz-preço-normal.png')";
        } else if (appMode) {
            cartazRender.style.backgroundImage = "url('fundo-cartaz-app.png')";
        } else if (isOfertaDoDia) {

        } else {
            if (appMode) {
                areaPreco.style.top = '345px';
            } else if (isOfertaDoDia) {
                areaPreco.style.top = '210px';
            } else {
                areaPreco.style.top = '290px';
            }
        }

        const textoCada2 = item.cadaText || item.cadaOutput || '';
        const len = textoCada2.length;
        if (appMode) {
            if (len === 7) { cadaOut.style.fontSize = '18px'; cadaOut.style.marginLeft = '30px'; cadaOut.style.left = 'auto'; }
            else if (len === 6) { cadaOut.style.fontSize = '24px'; cadaOut.style.marginLeft = '20px'; cadaOut.style.left = 'auto'; }
            else if (len === 5) { cadaOut.style.fontSize = '27px'; cadaOut.style.marginLeft = '20px'; cadaOut.style.left = 'auto'; }
            else { cadaOut.style.fontSize = '30px'; cadaOut.style.marginLeft = '30px'; cadaOut.style.left = 'auto'; }
        } else {
            cadaOut.style.marginLeft = '';
        }

        let dtIni = item.dataInicial || '';
        let dtFim = item.dataFinal || '';
        let rodapeDataFim = dtFim;
        let rodapeDataIni = dtIni;
        if (typeof inputFim !== 'undefined' && inputFim) {
            rodapeDataFim = inputFim;
            rodapeDataIni = inputIni || '';
        }

        if (appMode) {
          rodOut.style.top = '';
          rodOut.style.left = '';
            if (rodapeDataIni && rodapeDataFim && rodapeDataFim.includes('-')) {
                const di = rodapeDataIni.split('-');
                const df = rodapeDataFim.split('-');
                rodOut.innerHTML = `Oferta válida para cliente cadastrado no app <span style="font-weight:bold; display:inline-flex; align-items:center; gap:4px;">MIRA AQUI <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;"><circle cx="15" cy="21" r="1"></circle><circle cx="4" cy="21" r="1"></circle><path d="M23 1h-4l-2.68 13.39a2 2 0 0 1-2 1.61H4.6a2 2 0 0 1-2-1.61L1 6h17"></path></svg></span><br>Oferta válida de ${di[2]} à ${df[2]}/${df[1]}/${df[0]} ou enquanto durar o estoque`;
                if (typeof novoRodapeTexto !== 'undefined') novoRodapeTexto = rodOut.textContent; 
            } else if (!rodapeDataIni && rodapeDataFim && rodapeDataFim.includes('-')) {
                const df = rodapeDataFim.split('-'); 
                rodOut.innerHTML = `Oferta válida para cliente cadastrado no app <span style="font-weight:bold; display:inline-flex; align-items:center; gap:4px;">MIRA AQUI <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;"><circle cx="15" cy="21" r="1"></circle><circle cx="4" cy="21" r="1"></circle><path d="M23 1h-4l-2.68 13.39a2 2 0 0 1-2 1.61H4.6a2 2 0 0 1-2-1.61L1 6h17"></path></svg></span><br>Oferta válida até ${df[2]}/${df[1]}/${df[0]} ou enquanto durar o estoque`;
                if (typeof novoRodapeTexto !== 'undefined') novoRodapeTexto = rodOut.textContent;
            } else {
                rodOut.innerHTML = item.rodapeText || item.rodapeOutput || '';
                if (typeof novoRodapeTexto !== 'undefined') novoRodapeTexto = rodOut.textContent;
            }
        } else if (isOfertaDoDia) {
            if (rodapeDataIni && rodapeDataIni.includes('-')) {
                const di = rodapeDataIni.split('-');
                rodOut.textContent = `Aproveite! Oferta exclusiva para o dia ${di[2]}/${di[1]} ou enquanto durar o estoque`;
                rodOut.style.top ='410px';
                rodOut.style.left = '10px';
                if (typeof novoRodapeTexto !== 'undefined') novoRodapeTexto = rodOut.textContent;
            } else {
                rodOut.textContent = ``;
                rodOut.style.top ='410px';
                rodOut.style.left = '10px';
                if (typeof novoRodapeTexto !== 'undefined') novoRodapeTexto = rodOut.textContent;
            }
        } else {
            rodOut.style.top = '';
            rodOut.style.left = '';
        }
        // --- FIM DA FIDELIDADE VISUAL ---

        // Gera o canvas da página corrente
        const canvas = await html2canvas(containerRender, { scale: 3, useCORS: true, backgroundColor: null });
        const imgData = canvas.toDataURL('image/png');

        if (pdf === null) {
          // Inicializa o PDF na primeira página
          pdf = new jsPDF({ unit: 'mm', format: 'a4', compress: true });
        } else {
          // Adiciona uma nova página subsequente
          pdf.addPage();
        }

        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = pdf.internal.pageSize.getHeight();

        const ratio = Math.min(pdfWidth / canvas.width, pdfHeight / canvas.height);
        const imgWidth = canvas.width * ratio;
        const imgHeight = canvas.height * ratio;
        
        const marginX = ((pdfWidth - imgWidth) / 2) + 3
        const marginY = (pdfHeight - imgHeight) / 2 - 5;

        pdf.addImage(imgData, 'PNG', marginX, marginY, imgWidth, imgHeight);
      }

      if (pdf) {
        pdf.save(sanitizeFileName('todos-cartazes-selecionados', 'pdf'));
        alert('PDF contendo todos os cartazes selecionados foi gerado com sucesso!');
      }
    } catch (err) {
      console.error(err);
      alert('Ocorreu um erro ao tentar juntar todos os cartazes selecionados.');
    } finally {
      loadingOverlay.style.display = 'none';
    }
  });
</script>
</body>
</html>
